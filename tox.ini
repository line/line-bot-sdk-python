[tox]
# tox 4.56.0 changed the default of skip_missing_interpreters back to false
# (https://github.com/tox-dev/tox/pull/3966). CI runners install only one
# Python version per job, so missing interpreters must be skipped, not failed.
skip_missing_interpreters = true
envlist =
    py3.10,
    py3.11,
    py3.12,
    py3.13,
    py3.14,
    py3-flake8-src,
    py3-flake8-other

[testenv]
deps =
    six
    -r{toxinidir}/requirements.txt
    -r{toxinidir}/requirements-test.txt
commands = py.test -v tests/

[testenv:py3]
basepython = python3
deps = {[testenv]deps}
commands = py.test -v --cov=linebot tests/

[testenv:py3-flake8-src]
basepython = python3
deps =
    six
    flake8
    flake8-docstrings
# Ignores generated files.
commands = flake8 --filename=linebot/*.py

[testenv:py3-flake8-other]
basepython = python3
deps =
    six
    flake8
commands = flake8 tests/ examples/ --max-line-length=120
